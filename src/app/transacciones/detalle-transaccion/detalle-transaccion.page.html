<ion-content>
  <app-transaction-detail *ngIf="transaccion" [transaccion]="transaccion" (onClose)="regresar()"
    (onEdit)="abrirEdicion($event)" (onDelete)="confirmarEliminacion($event)">
  </app-transaction-detail>

  <div *ngIf="!transaccion" class="ion-padding ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Cargando información del movimiento...</p>
  </div>
</ion-content>
