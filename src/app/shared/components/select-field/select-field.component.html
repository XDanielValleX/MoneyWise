<ion-item lines="full" class="ion-margin-bottom">
  <ion-icon *ngIf="icon" [name]="icon" slot="start" color="medium"></ion-icon>

  <ion-select [label]="label" labelPlacement="floating" [formControl]="control" interface="action-sheet">
    <ion-select-option *ngFor="let opt of options" [value]="opt.value">
      {{ opt.text }}
    </ion-select-option>
  </ion-select>
</ion-item>

<ion-text color="danger" *ngIf="control.invalid && control.touched" class="error-message">
  <small>Por favor, selecciona una opción.</small>
</ion-text>
